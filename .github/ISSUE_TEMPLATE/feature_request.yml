name: Feature request
description: Suggest a scoped improvement for RuneChat.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests concrete. Explain the user problem first, then the proposed behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or operational issue does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should RuneChat do?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select every platform this request applies to.
      multiple: true
      options:
        - ANDROID
        - PC
        - WEB
        - IOS
        - MAC
        - LINUX
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth and accounts
        - Servers and channels
        - Messaging
        - Real-time/WebSocket
        - Moderation and safety
        - Clients
        - Deployment
        - Security hardening
        - Developer tooling
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or tradeoffs.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should maintainers know this is done?
      placeholder: |
        - ...
        - ...
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This request does not disclose a private security vulnerability.
          required: true
