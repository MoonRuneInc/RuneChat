name: Bug report
description: Report a reproducible problem in Cauldron.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for maintainers to reproduce it.

        Do not post secrets, tokens, private server invites, or sensitive account data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the visible failure and affected area.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select every platform where this issue reproduces.
      multiple: true
      options:
        - ANDROID
        - PC
        - WEB
        - IOS
        - MAC
        - LINUX
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, commit SHA, or branch name.
      placeholder: v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, device, deployment target, or Docker details.
      placeholder: Windows 11, Firefox 125, Android 15, Docker Compose, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Redact secrets first.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets, tokens, private invites, and sensitive account data.
          required: true
