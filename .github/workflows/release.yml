name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install NSIS
        shell: pwsh
        run: |
          if (Get-Command makensis -ErrorAction SilentlyContinue) {
            makensis /VERSION
            exit 0
          }

          $installed = $false
          for ($i = 1; $i -le 3 -and -not $installed; $i++) {
            Write-Host "Installing NSIS with winget, attempt $i..."
            winget install --id NSIS.NSIS -e --source winget --disable-interactivity --accept-package-agreements --accept-source-agreements
            $installed = $LASTEXITCODE -eq 0
            if (-not $installed) { Start-Sleep -Seconds (10 * $i) }
          }

          if (-not $installed) {
            for ($i = 1; $i -le 3 -and -not $installed; $i++) {
              Write-Host "Installing NSIS with Chocolatey, attempt $i..."
              choco install nsis --yes --no-progress
              $installed = $LASTEXITCODE -eq 0
              if (-not $installed) { Start-Sleep -Seconds (10 * $i) }
            }
          }

          $nsisPaths = @(
            "${env:ProgramFiles}\NSIS",
            "${env:ProgramFiles(x86)}\NSIS",
            "C:\ProgramData\chocolatey\lib\nsis\tools"
          )
          foreach ($path in $nsisPaths) {
            if (Test-Path (Join-Path $path "makensis.exe")) {
              Add-Content $env:GITHUB_PATH $path
              & (Join-Path $path "makensis.exe") /VERSION
              exit 0
            }
          }

          throw "NSIS installation succeeded but makensis.exe was not found"

      - run: npm ci
        working-directory: ./frontend

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./frontend

      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: target/release/bundle/

  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable with Android target
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-linux-android
          rustup default stable
          rustc --version
          cargo --version

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> "$GITHUB_ENV"

      - run: npm ci
        working-directory: ./frontend

      - name: Init Android project
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android init --ci

      - name: Build Android APK
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android build --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: ./windows/

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./android/

      - name: Create GitHub Release
        run: |
          files=$(find ./windows ./android -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.apk" \))
          gh release create "${{ github.ref_name }}" \
            --title "RuneChat ${{ github.ref_name }}" \
            --generate-notes \
            $files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
