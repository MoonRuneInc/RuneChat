name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          cache-on-failure: true

      - name: Install NSIS
        shell: pwsh
        run: |
          if (Get-Command makensis -ErrorAction SilentlyContinue) {
            makensis /VERSION
            exit 0
          }

          $installed = $false
          for ($i = 1; $i -le 3 -and -not $installed; $i++) {
            Write-Host "Installing NSIS with winget, attempt $i..."
            winget install --id NSIS.NSIS -e --source winget --disable-interactivity --accept-package-agreements --accept-source-agreements
            $installed = $LASTEXITCODE -eq 0
            if (-not $installed) { Start-Sleep -Seconds (10 * $i) }
          }

          if (-not $installed) {
            for ($i = 1; $i -le 3 -and -not $installed; $i++) {
              Write-Host "Installing NSIS with Chocolatey, attempt $i..."
              choco install nsis --yes --no-progress
              $installed = $LASTEXITCODE -eq 0
              if (-not $installed) { Start-Sleep -Seconds (10 * $i) }
            }
          }

          $nsisPaths = @(
            "${env:ProgramFiles}\NSIS",
            "${env:ProgramFiles(x86)}\NSIS",
            "C:\ProgramData\chocolatey\lib\nsis\tools"
          )
          foreach ($path in $nsisPaths) {
            if (Test-Path (Join-Path $path "makensis.exe")) {
              Add-Content $env:GITHUB_PATH $path
              & (Join-Path $path "makensis.exe") /VERSION
              exit 0
            }
          }

          throw "NSIS installation succeeded but makensis.exe was not found"

      - run: npm ci
        working-directory: ./frontend

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./frontend

      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: target/release/bundle/

  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable with Android target
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-linux-android
          rustup default stable
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          cache-on-failure: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> "$GITHUB_ENV"

      - run: npm ci
        working-directory: ./frontend

      - name: Init Android project
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android init --ci

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to publish installable Android release APKs."
              exit 1
            fi
          done

          android_project="frontend/src-tauri/gen/android"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$android_project/upload-keystore.jks"
          {
            printf 'storeFile=upload-keystore.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > "$android_project/keystore.properties"

          node <<'NODE'
          const fs = require('node:fs');
          const gradleFile = 'frontend/src-tauri/gen/android/app/build.gradle.kts';
          let text = fs.readFileSync(gradleFile, 'utf8');

          const missingImports = [
            'import java.io.FileInputStream',
            'import java.util.Properties',
          ].filter((line) => !text.includes(line));
          if (missingImports.length > 0) {
            text = `${missingImports.join('\n')}\n${text}`;
          }

          if (!text.includes('create("release")')) {
            const signingConfig = `
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      keystoreProperties.load(FileInputStream(keystorePropertiesFile))

                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = rootProject.file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }
          `;
            text = text.replace(/android\s*\{\s*/, (match) => `${match}${signingConfig}\n`);
          }

          const signingLine = 'signingConfig = signingConfigs.getByName("release")';
          if (!text.includes(signingLine)) {
            const lines = text.split('\n');
            text = lines.flatMap((line) => {
              if (/getByName\("release"\)\s*\{/.test(line)) {
                return [line, `${line.match(/^\s*/)[0]}    ${signingLine}`];
              }
              return [line];
            }).join('\n');
          }

          fs.writeFileSync(gradleFile, text);
          NODE

      - name: Build Android APK
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android build --target aarch64

      - name: Verify Android APK signature
        run: |
          set -euo pipefail
          mapfile -t apks < <(find frontend/src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" ! -name "*unsigned*" | sort)
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "::error::No signed Android APK found."
            exit 1
          fi

          for apk in "${apks[@]}"; do
            apksigner verify --verbose "$apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            !frontend/src-tauri/gen/android/app/build/outputs/apk/**/*unsigned*.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: ./windows/

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./android/

      - name: Create or update GitHub Release
        shell: bash
        run: |
          mapfile -t files < <(find ./windows ./android -type f \( -name "*.msi" -o -name "*.exe" -o \( -name "*.apk" ! -name "*unsigned*" \) \) | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${files[@]}" --clobber --repo "${{ github.repository }}"
          else
            gh release create "${{ github.ref_name }}" \
              --title "RuneChat ${{ github.ref_name }}" \
              --generate-notes \
              --verify-tag \
              --repo "${{ github.repository }}" \
              "${files[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
