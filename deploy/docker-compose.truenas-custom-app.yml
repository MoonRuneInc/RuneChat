# Cauldron — TrueNAS SCALE Custom App
#
# For TrueNAS SCALE 24.04+ Custom Apps (install via YAML).
# Paste this file directly into the YAML field in the TrueNAS Custom App UI.
#
# Before pasting, replace all REPLACE_* placeholders with real values.
# Do NOT commit this file to git after filling in secrets.

services:
  db:
    image: mystiatech/cauldron-db:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: cauldron
      POSTGRES_PASSWORD: REPLACE_DB_PASSWORD
      POSTGRES_DB: cauldron
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cauldron"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    image: mystiatech/cauldron-app:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cauldron:REPLACE_DB_PASSWORD@db:5432/cauldron
      JWT_SECRET: REPLACE_JWT_SECRET
      TOTP_ENCRYPTION_KEY: REPLACE_TOTP_ENCRYPTION_KEY
      DOMAIN: chat.moonrune.cc
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: mystiatech/cauldron-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  proxy:
    image: nginx:1.30-alpine-slim
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - type: bind
        source: /mnt/plex_pool/cauldron/prod.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    depends_on:
      - app
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  redis_data:
