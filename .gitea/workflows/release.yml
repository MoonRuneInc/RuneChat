name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis

      - run: npm ci
        working-directory: ./frontend

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./frontend

      - uses: actions/upload-artifact@v3
        with:
          name: windows-bundles
          path: target/release/bundle/

  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://chat.moonrune.cc/api
      VITE_WS_BASE_URL: wss://chat.moonrune.cc/ws
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> "$GITHUB_ENV"

      - run: npm ci
        working-directory: ./frontend

      - name: Init Android project
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android init --ci

      - name: Build Android APK
        working-directory: ./frontend
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android build --target aarch64

      - uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: windows-bundles
          path: ./windows/

      - uses: actions/download-artifact@v3
        with:
          name: android-apk
          path: ./android/

      - name: Create Gitea Release
        run: |
          release_id=$(python3 << 'PYEOF'
          import json, os, urllib.request
          api_url = os.environ['API_URL'].rstrip('/')
          repo = os.environ['REPO']
          tag = os.environ['TAG']
          token = os.environ['TOKEN']
          req = urllib.request.Request(
              f"{api_url}/repos/{repo}/releases",
              data=json.dumps({"tag_name": tag, "name": f"Cauldron {tag}", "body": f"Release {tag}"}).encode(),
              headers={"Authorization": f"token {token}", "Content-Type": "application/json"},
              method="POST"
          )
          try:
              resp = urllib.request.urlopen(req)
          except urllib.error.HTTPError as e:
              if e.code == 409:
                  req2 = urllib.request.Request(
                      f"{api_url}/repos/{repo}/releases/tags/{tag}",
                      headers={"Authorization": f"token {token}"}
                  )
                  resp = urllib.request.urlopen(req2)
              else:
                  raise
          release = json.loads(resp.read())
          print(release['id'])
          PYEOF
          )
          for file in $(find ./windows ./android -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.apk" \)); do
            basename=$(basename "$file")
            echo "Uploading $basename ..."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -F "attachment=@$file" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/$release_id/assets?name=$basename"
          done
        env:
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
